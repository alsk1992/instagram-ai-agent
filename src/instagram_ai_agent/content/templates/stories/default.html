<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>story</title>
<style>
$css
.story {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 120px 80px 180px 80px;
  position: relative;
}
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: '$body_font', sans-serif;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.8;
}
.top .kind {
  color: $accent;
}
.body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 56px;
}
.hook {
  font-family: '$heading_font', sans-serif;
  font-weight: 900;
  font-size: 120px;
  line-height: 0.96;
  letter-spacing: -3px;
  color: $fg;
}
.detail {
  font-family: '$body_font', sans-serif;
  font-size: 44px;
  line-height: 1.22;
  font-weight: 500;
  color: $fg;
  opacity: 0.92;
  max-width: 90%;
}
.cta {
  display: inline-block;
  padding: 28px 48px;
  background: $accent;
  color: $bg;
  font-family: '$heading_font', sans-serif;
  font-weight: 900;
  font-size: 42px;
  letter-spacing: 1px;
  border-radius: 999px;
  align-self: flex-start;
}
.footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  font-family: '$body_font', sans-serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: $accent;
}
.story.announcement .hook { font-size: 132px; }
.story.quote .hook      { font-size: 92px; font-style: italic; }
.story.quote .detail::before { content: "— "; }
</style>
</head>
<body>
<div class="story $kind_class">
  <div class="top">
    <div class="kind">$kind_label</div>
    <div>$timestamp</div>
  </div>
  <div class="body">
    <div class="hook">$hook</div>
    <div class="detail">$detail</div>
    $cta_block
  </div>
  <div class="footer">
    <div>$watermark</div>
    <div>$swipe_hint</div>
  </div>
</div>
</body>
</html>
