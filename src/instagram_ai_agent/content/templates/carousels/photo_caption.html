<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>slide</title>
<style>
$css
body {
  padding: 0;
}
.slide {
  width: 100%;
  height: 100%;
  position: relative;
  background-image: url("$background_image");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.slide::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0, 0, 0, 0.35) 0%,
    rgba(0, 0, 0, 0.05) 35%,
    rgba(0, 0, 0, 0.15) 60%,
    rgba(0, 0, 0, 0.80) 100%
  );
  pointer-events: none;
  z-index: 1;
}
.meta {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 56px 72px 0;
  font-family: '$body_font', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #ffffff;
  text-transform: uppercase;
}
.meta .idx {
  color: $accent;
}
.card {
  position: relative;
  z-index: 2;
  margin: 0 56px 72px;
  padding: 48px 56px;
  background: rgba(0, 0, 0, 0.55);
  border-left: 8px solid $accent;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.title {
  font-family: '$heading_font', sans-serif;
  font-weight: 900;
  font-size: 78px;
  line-height: 1.02;
  letter-spacing: -2px;
  color: #ffffff;
  max-width: 100%;
}
.body {
  margin-top: 28px;
  font-family: '$body_font', sans-serif;
  font-size: 34px;
  line-height: 1.28;
  font-weight: 500;
  color: #ffffff;
  opacity: 0.96;
  max-width: 100%;
}
.slide.hook .title {
  font-size: 104px;
  line-height: 0.98;
  letter-spacing: -3px;
}
.slide.hook .body { display: none; }
.slide.cta .title { font-size: 82px; }
.slide.cta .body { font-weight: 700; }
.watermark {
  color: $accent;
  font-family: '$body_font', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="slide $hook_class $cta_class">
  <div class="meta">
    <div class="idx">$index / $total</div>
    <div class="watermark">$watermark</div>
  </div>
  <div class="card">
    <div class="title">$title</div>
    <div class="body">$body</div>
  </div>
</div>
</body>
</html>
