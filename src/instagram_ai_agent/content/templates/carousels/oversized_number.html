<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>slide</title>
<style>
$css
.slide {
  width: 100%;
  height: 100%;
  position: relative;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow: hidden;
}
.big-num {
  position: absolute;
  top: -40px;
  right: -40px;
  font-family: '$heading_font', sans-serif;
  font-weight: 900;
  font-size: 720px;
  line-height: 0.85;
  color: $accent;
  opacity: 0.18;
  letter-spacing: -30px;
  pointer-events: none;
  user-select: none;
}
.meta {
  position: relative;
  z-index: 2;
  font-family: '$body_font', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: $fg;
  opacity: 0.55;
}
.content {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  gap: 40px;
  margin-top: auto;
  margin-bottom: auto;
  max-width: 85%;
}
.title {
  font-family: '$heading_font', sans-serif;
  font-weight: 900;
  font-size: 96px;
  line-height: 1;
  letter-spacing: -2.5px;
  color: $fg;
  margin: 0;
}
.body {
  font-family: '$body_font', sans-serif;
  font-size: 38px;
  line-height: 1.3;
  font-weight: 500;
  color: $fg;
  opacity: 0.88;
  max-width: 92%;
}
.slide.hook .big-num {
  color: $fg;
  opacity: 0.08;
}
.slide.hook .title {
  font-size: 128px;
  line-height: 0.96;
}
.slide.hook .body {
  display: none;
}
.slide.cta .title {
  color: $accent;
  font-size: 108px;
}
.footer {
  position: relative;
  z-index: 2;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  font-family: '$body_font', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: $fg;
  opacity: 0.6;
}
.watermark {
  color: $accent;
}
</style>
</head>
<body>
<div class="slide $hook_class $cta_class">
  <div class="big-num">$index</div>
  <div class="meta">chapter $index · of $total</div>
  <div class="content">
    <div class="title">$title</div>
    <div class="body">$body</div>
  </div>
  <div class="footer">
    <div class="watermark">$watermark</div>
    <div>swipe →</div>
  </div>
</div>
</body>
</html>
