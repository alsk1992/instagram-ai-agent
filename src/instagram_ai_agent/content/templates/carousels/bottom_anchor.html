<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>slide</title>
<style>
$css
.slide {
  width: 100%;
  height: 100%;
  display: grid;
  grid-template-rows: 55% 45%;
  position: relative;
}
.visual {
  background: $accent;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.visual .idx {
  font-family: '$heading_font', sans-serif;
  font-weight: 900;
  font-size: 360px;
  line-height: 1;
  color: $bg;
  opacity: 0.18;
  letter-spacing: -10px;
}
.content {
  padding: 60px 60px 80px 60px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  gap: 24px;
  background: $bg;
}
.meta {
  font-family: '$body_font', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: $fg;
  opacity: 0.55;
}
.title {
  font-family: '$heading_font', sans-serif;
  font-weight: 900;
  font-size: 72px;
  line-height: 1.03;
  letter-spacing: -1.5px;
  color: $fg;
  margin: 0;
}
.body {
  font-family: '$body_font', sans-serif;
  font-size: 34px;
  line-height: 1.3;
  font-weight: 500;
  color: $fg;
  opacity: 0.82;
  max-width: 95%;
}
.slide.hook .visual {
  background: $fg;
}
.slide.hook .visual .idx {
  color: $bg;
  opacity: 0.12;
}
.slide.hook .title {
  font-size: 92px;
  line-height: 0.98;
}
.slide.hook .body {
  display: none;
}
.slide.cta .visual {
  background: $accent;
}
.slide.cta .title {
  color: $accent;
}
.watermark {
  position: absolute;
  right: 60px;
  bottom: 30px;
  font-family: '$body_font', sans-serif;
  font-size: 20px;
  font-weight: 700;
  color: $fg;
  opacity: 0.45;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="slide $hook_class $cta_class">
  <div class="visual">
    <div class="idx">$index</div>
  </div>
  <div class="content">
    <div class="meta">$index / $total</div>
    <div class="title">$title</div>
    <div class="body">$body</div>
  </div>
  <div class="watermark">$watermark</div>
</div>
</body>
</html>
