<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>slide</title>
<style>
$css
.slide {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  position: relative;
  padding: 0;
}
.meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: '$body_font', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 1px;
  opacity: 0.75;
  text-transform: uppercase;
}
.meta .idx {
  color: $accent;
}
.content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 48px;
}
.title {
  font-family: '$heading_font', sans-serif;
  font-weight: 900;
  font-size: 92px;
  line-height: 1.02;
  letter-spacing: -2px;
  color: $fg;
  max-width: 100%;
}
.body {
  font-family: '$body_font', sans-serif;
  font-size: 40px;
  line-height: 1.25;
  font-weight: 500;
  color: $fg;
  opacity: 0.92;
  max-width: 92%;
}
.slide.hook .title {
  font-size: 120px;
  line-height: 0.98;
  letter-spacing: -3px;
}
.slide.hook .body {
  display: none;
}
.slide.cta .title {
  font-size: 96px;
}
.slide.cta .body {
  font-weight: 700;
}
.footer {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  font-family: '$body_font', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.watermark {
  color: $accent;
}
.dot-row {
  display: flex;
  gap: 10px;
}
.dot-row .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: $fg;
  opacity: 0.25;
}
.dot-row .dot.active {
  opacity: 1;
  background: $accent;
}
</style>
</head>
<body>
<div class="slide $hook_class $cta_class">
  <div class="meta">
    <div class="idx">$index / $total</div>
    <div>swipe →</div>
  </div>
  <div class="content">
    <div class="title">$title</div>
    <div class="body">$body</div>
  </div>
  <div class="footer">
    <div class="watermark">$watermark</div>
    <div class="dot-row"><!-- dots filled by JS if needed --></div>
  </div>
</div>
</body>
</html>
