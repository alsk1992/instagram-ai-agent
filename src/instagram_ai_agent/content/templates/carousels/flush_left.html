<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>slide</title>
<style>
$css
.slide {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 0;
  position: relative;
}
.slide::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 14px;
  height: 100%;
  background: $accent;
}
.meta {
  padding-left: 40px;
  font-family: '$body_font', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.55;
}
.content {
  flex: 1;
  padding-left: 40px;
  padding-right: 20%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 36px;
}
.title {
  font-family: '$heading_font', sans-serif;
  font-weight: 900;
  font-size: 84px;
  line-height: 1.05;
  letter-spacing: -2px;
  color: $fg;
  text-align: left;
}
.body {
  font-family: '$body_font', sans-serif;
  font-size: 38px;
  line-height: 1.3;
  font-weight: 500;
  color: $fg;
  opacity: 0.88;
  text-align: left;
  max-width: 85%;
}
.slide.hook .title {
  font-size: 110px;
  line-height: 0.98;
}
.slide.hook .body {
  display: none;
}
.slide.cta .title {
  color: $accent;
}
.footer {
  padding-left: 40px;
  font-family: '$body_font', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  opacity: 0.6;
}
.watermark {
  color: $accent;
}
</style>
</head>
<body>
<div class="slide $hook_class $cta_class">
  <div class="meta">$index / $total</div>
  <div class="content">
    <div class="title">$title</div>
    <div class="body">$body</div>
  </div>
  <div class="footer"><span class="watermark">$watermark</span></div>
</div>
</body>
</html>
