<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>quote</title>
<style>
$css
.frame {
  width: 100%;
  height: 100%;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px;
}
.bigquote {
  position: absolute;
  top: 30px;
  left: 60px;
  font-family: 'Georgia', 'Times New Roman', serif;
  font-size: 280px;
  font-weight: 700;
  line-height: 0.8;
  color: $accent;
  opacity: 0.55;
  letter-spacing: -8px;
}
.quote {
  font-family: 'Georgia', 'Times New Roman', serif;
  font-style: italic;
  font-weight: 600;
  font-size: 80px;
  line-height: 1.18;
  letter-spacing: -1px;
  color: $fg;
  margin-top: 80px;
  max-width: 95%;
}
.byline {
  margin-top: 56px;
  font-family: '$body_font', sans-serif;
  font-size: 26px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: $accent;
}
.byline::before {
  content: "— ";
}
.watermark {
  position: absolute;
  bottom: 32px;
  right: 32px;
  font-family: '$body_font', sans-serif;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: 1px;
  color: $accent;
  opacity: 0.65;
}
</style>
</head>
<body>
<div class="frame">
  <div class="bigquote">"</div>
  <div class="quote">$quote</div>
  <div class="byline">$byline</div>
  <div class="watermark">$watermark</div>
</div>
</body>
</html>
