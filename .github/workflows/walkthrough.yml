name: Regenerate walkthrough video

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/record_real_walkthrough.py"
      - "scripts/compose_real_walkthrough.py"
      - "scripts/gen_walkthrough_video.py"
      - "scripts/gen_demo_media.py"
      - "docs/media/*.svg"
      - "src/instagram_ai_agent/**"
      - ".github/workflows/walkthrough.yml"

permissions:
  contents: write

jobs:
  walkthrough:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg librsvg2-bin fonts-dejavu

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "pyproject.toml"

      - name: Install package + media-gen deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "."
          python -m pip install cairosvg mutagen imageio-ffmpeg Pillow asciinema
          # Kokoro brings torch as a transitive dep (~2GB). Runs on CPU in CI.
          python -m pip install kokoro soundfile
          python -m playwright install chromium

      - name: Install agg (asciicast → GIF/MP4 renderer)
        uses: baptiste0928/cargo-install@v3
        with:
          crate: agg
          git: https://github.com/asciinema/agg

      - name: Regenerate SVG + PNG demo media
        run: python scripts/gen_demo_media.py

      - name: Record REAL dashboard + CLI executions
        env:
          IG_SKIP_WARMUP: "1"
        run: python scripts/record_real_walkthrough.py

      - name: Compose narrated walkthrough from real recordings
        env:
          IG_KOKORO_DEVICE: cpu
        run: python scripts/compose_real_walkthrough.py

      - name: Commit regenerated media
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/media docs/screenshots
          if ! git diff --cached --quiet; then
            git commit -m "ci: regenerate walkthrough + demo media"
            git push
          else
            echo "No media changes to commit."
          fi
